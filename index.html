<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VerdictPulse · 判决书管理系统</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --primary: #7c6fa0;
    --primary-dark: #5a5078;
    --primary-mid: #9585b8;
    --primary-light: #f0edf7;
    --accent: #7c6fa0;
    --accent-light: #f0edf7;
    --bg: #f5f3ef;
    --surface: #ffffff;
    --surface-alt: #faf9f7;
    --border: #e8e4de;
    --border-strong: #d5cfc6;
    --text: #1a1a1a;
    --text-muted: #7a7570;
    --text-light: #b0a89e;
    --win1: #1a6b3c;
    --win1-bg: #e6f4ec;
    --win2: #1a4d8f;
    --win2-bg: #e8f0fb;
    --winRetry: #334155;
    --winRetry-bg: #f1f5f9;
    --lose: #7f1d1d;
    --lose-bg: #fdeaea;
    --procedural: #7a7570;
    --procedural-bg: #f0ede8;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
    --shadow-lg: 0 12px 28px rgba(0,0,0,0.10), 0 4px 8px rgba(0,0,0,0.06);
  }
  body {
    font-family: 'Inter', 'Segoe UI', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.5;
  }

  /* Header */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px 0;
    box-shadow: var(--shadow);
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 16px;
  }
  .header-title h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.3px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .header-title p {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 2px;
    letter-spacing: 0.3px;
    margin-left: 48px;
  }
  .logo-icon {
    width: 36px; height: 36px;
    background: #1a1a1a;
    border-radius: 10px;
    display: inline-flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    vertical-align: middle;
  }
  .global-search {
    display: flex;
    align-items: center;
    background: var(--surface-alt);
    border: 1px solid var(--border-strong);
    border-radius: 9px;
    padding: 8px 14px;
    gap: 8px;
    min-width: 360px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .global-search:focus-within {
    border-color: #a09080;
    background: white;
    box-shadow: 0 0 0 2px var(--primary-light);
  }
  .global-search input {
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 15px;
    width: 100%;
  }
  .global-search input::placeholder { color: var(--text-light); }
  .global-search svg { color: var(--text-light); flex-shrink: 0; }

  /* Stats cards */
  .stats-bar {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    padding-bottom: 16px;
  }
  .stat-card {
    background: var(--surface-alt);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 6px 14px;
    min-width: 64px;
    text-align: center;
    cursor: default;
    transition: background 0.2s, transform 0.2s;
  }
  .stat-card:hover { background: white; transform: translateY(-1px); box-shadow: var(--shadow); }
  .stat-card .num {
    font-size: 21px;
    font-weight: 700;
    line-height: 1.2;
    color: var(--text);
    letter-spacing: -0.5px;
  }
  .stat-card .label {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 1px;
    white-space: nowrap;
  }
  .stat-card.highlight .num { color: #111827; }
  .stat-card.stat-total { border-bottom: 2px solid #374151 !important; }
  .stat-card.stat-win { border-bottom: 2px solid #166534 !important; }
  .stat-card.stat-win .num { color: var(--win1); }
  .stat-card.stat-lose { border-bottom: 2px solid #991b1b !important; }
  .stat-card.stat-lose .num { color: var(--lose); }
  .stat-card.stat-proc { border-bottom: 2px solid var(--border-strong) !important; }

  /* Nav tabs */
  .nav-tabs {
    display: flex;
    gap: 8px;
    padding: 0 0 0 0;
  }
  .nav-tab {
    padding: 10px 20px;
    border-radius: 8px 8px 0 0;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-muted);
    border: 1px solid transparent;
    border-bottom: none;
    background: transparent;
    transition: all 0.2s;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 6px;
    position: relative;
    letter-spacing: 0.2px;
  }
  .nav-tab:hover { background: var(--surface-alt); color: var(--text); }
  .nav-tab.active {
    background: var(--surface);
    color: var(--text);
    font-weight: 700;
    border-bottom: 3px solid var(--primary);
  }
  .nav-tab .badge {
    background: rgba(255,255,255,0.15);
    border-radius: 999px;
    padding: 1px 7px;
    font-size: 12px;
    font-weight: 700;
  }
  .nav-tab.active .badge {
    background: var(--accent-light);
    color: var(--accent);
  }

  /* Main content */
  .layout { display: flex; gap: 20px; max-width: 1500px; margin: 0 auto; align-items: flex-start; padding: 20px 24px; }
  .sidebar {
    width: 188px; min-width: 188px; max-width: 188px;
    flex-shrink: 0;
    position: sticky; top: 20px; max-height: calc(100vh - 40px); overflow-y: auto; overflow-x: hidden;
  }
  .sidebar-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 0 8px 0;
    font-size: 13px; font-weight: 600; color: var(--text-muted);
    border-bottom: 1px solid var(--border-strong);
    margin-bottom: 4px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .filter-section { margin-bottom: 2px; }
  .filter-section-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 0 6px 0;
    cursor: pointer; user-select: none;
    font-size: 13px; font-weight: 600; color: var(--text);
    border-bottom: 1px solid var(--border);
    gap: 6px;
  }
  .filter-section-header .fsh-title { display:flex; align-items:center; gap:6px; }
  .filter-section-header:hover { color: var(--primary); }
  .filter-section-chevron {
    font-size: 10px; color: var(--text-muted);
    transition: transform 0.2s;
  }
  .filter-section-chevron.collapsed { transform: rotate(-90deg); }
  .filter-section-body { padding: 2px 0 4px 0; }
  .filter-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 4px 6px 8px;
    font-size: 13px; color: var(--text);
    cursor: pointer; transition: background 0.1s;
    border-radius: 5px;
    gap: 4px;
  }
  .filter-item:hover { background: var(--surface-alt); }
  .filter-item.active { background: var(--surface); color: var(--text); font-weight: 700; border-left: 3px solid var(--primary); padding-left: 5px; }
  .filter-item .fi-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .filter-item .fi-cnt { color: var(--text-light); font-size: 11px; flex-shrink: 0; }
  .filter-item.active .fi-cnt { color: var(--text-muted); }
  .filter-court-region { padding: 6px 0 2px 8px; font-size: 10px; font-weight: 600; color: var(--text-light); letter-spacing: 0.05em; }
  .main { padding: 20px 0; flex: 1; min-width: 0; }

  /* Global search results banner */
  .search-banner {
    background: var(--primary-light);
    border: 1px solid #bfd4f5;
    border-radius: 8px;
    padding: 10px 16px;
    margin-bottom: 16px;
    display: none;
    align-items: center;
    gap: 8px;
    color: var(--primary-dark);
    font-size: 13px;
  }
  .search-banner.visible { display: flex; }
  .search-banner button {
    margin-left: auto;
    background: none;
    border: 1px solid var(--primary);
    color: var(--primary);
    border-radius: 5px;
    padding: 3px 10px;
    cursor: pointer;
    font-size: 12px;
  }

  /* Judge stats panel */
  /* judge-panel merged into sidebar */
  .judge-region {
    margin-bottom: 12px;
  }
  .judge-region-title {
    font-size: 12px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 2px 4px;
    margin-bottom: 4px;
    border-bottom: 1px solid var(--border);
  }
  .judge-court-group {
    margin-bottom: 6px;
  }
  .judge-court-label {
    font-size: 10px;
    color: #9ca3af;
    padding: 1px 4px;
    margin-bottom: 2px;
  }
  .judge-chips-row {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .judge-chip {
    background: #f3f4f6;
    color: #374151;
    border: 1px solid #d1d5db;
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 13px;
    font-weight: 500;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
    cursor: pointer;
    transition: all 0.15s;
    width: 100%;
    box-sizing: border-box;
  }
  .judge-chip.active-judge { background: #e0e7ff; border-color: #818cf8; color: #3730a3; }
  .judge-chip:hover { background: #e5e7eb; border-color: #9ca3af; color: #111827; }
  .judge-chip .cnt {
    background: #6b7280;
    color: white;
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 11px;
    font-weight: 700;
  }

  /* Tab content panel */
  .tab-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 0 10px 10px 10px;
    box-shadow: var(--shadow);
    overflow: hidden;
    display: none;
  }
  .tab-panel.active { display: block; }

  /* Table toolbar */
  .table-toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface-alt);
    flex-wrap: wrap;
  }
  .table-search {
    display: flex;
    align-items: center;
    background: white;
    border: 1px solid var(--border-strong);
    border-radius: 6px;
    padding: 6px 12px;
    gap: 6px;
    flex: 1;
    min-width: 180px;
    max-width: 340px;
  }
  .table-search input {
    border: none;
    outline: none;
    font-size: 13px;
    width: 100%;
    color: var(--text);
  }
  .table-search svg { color: var(--text-muted); flex-shrink: 0; }
  .table-search:focus-within { border-color: var(--primary-mid); box-shadow: 0 0 0 2px var(--primary-light); }
  .table-info {
    font-size: 12px;
    color: var(--text-muted);
    margin-left: auto;
    white-space: nowrap;
  }

  /* Table */
  .table-wrap { overflow-x: auto; }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  thead th {
    background: var(--surface-alt);
    color: var(--text-muted);
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    padding: 11px 14px;
    text-align: left;
    border-bottom: 2px solid var(--border-strong);
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
    position: sticky;
    top: 0;
    z-index: 1;
  }
  thead th:hover { background: var(--primary-light); color: var(--primary); }
  thead th .sort-icon { display: inline-block; margin-left: 4px; opacity: 0.4; font-size: 10px; }
  thead th.sorted-asc .sort-icon::after { content: '▲'; opacity: 1; color: var(--primary); }
  thead th.sorted-desc .sort-icon::after { content: '▼'; opacity: 1; color: var(--primary); }
  thead th:not(.sorted-asc):not(.sorted-desc) .sort-icon::after { content: '⇅'; }
  tbody tr {
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.12s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:nth-child(even):not(.group-header) { background: #fafbfc; }
  tbody tr:hover:not(.group-header) { background: var(--primary-light); }
  tbody td {
    padding: 10px 12px;
    vertical-align: middle;
    max-width: 200px;
  }
  tbody td.date { white-space: nowrap; color: var(--text-muted); font-size: 13px; }
  tbody td.plaintiff { font-weight: 600; color: var(--text); white-space: nowrap; max-width: 150px; overflow: hidden; text-overflow: ellipsis; }
  tbody td.case-no { font-family: monospace; font-size: 13px; color: var(--text-muted); white-space: nowrap; }
  tbody td.court { color: var(--text-muted); font-size: 13px; white-space: nowrap; max-width: 160px; overflow: hidden; text-overflow: ellipsis; }
  tbody td.judge { white-space: nowrap; max-width: 140px; overflow: hidden; text-overflow: ellipsis; }
  tbody td.claim { white-space: nowrap; font-size: 13px; }
  tbody td.keywords { color: var(--text-muted); font-size: 13px; max-width: 180px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* Result badge */
  .badge-result {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 10px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 700;
    white-space: nowrap;
    letter-spacing: 0.4px;
    border: 1px solid transparent;
  }
  .badge-result.win1 { background: var(--win1-bg); color: var(--win1); border-color: #b7e4c7; }
  .badge-result.win2 { background: var(--win2-bg); color: var(--win2); border-color: #bfd4f5; }
  .badge-result.winRetry { background: var(--winRetry-bg); color: var(--winRetry); border-color: #cbd5e1; }
  .badge-result.lose { background: var(--lose-bg); color: var(--lose); border-color: #f5b8b8; }
  .badge-result.lose1 { background: var(--lose-bg); color: var(--lose); border-color: #f5b8b8; }
  .badge-result.procedural { background: var(--procedural-bg); color: var(--procedural); border-color: #d1d5db; }

  /* Keyword tags */
  .kw-tag {
    display: inline-block;
    background: #f1f5f9;
    color: var(--text-muted);
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 11px;
    margin: 1px 2px;
    border: 1px solid var(--border);
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--text-muted);
  }
  .empty-state svg { margin-bottom: 12px; opacity: 0.3; }
  .empty-state p { font-size: 14px; }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 20px;
    backdrop-filter: blur(2px);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: white;
    border-radius: 12px;
    border: 1px solid var(--border-strong);
    box-shadow: var(--shadow-lg);
    max-width: 700px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    animation: modalIn 0.2s ease;
  }
  @keyframes modalIn {
    from { transform: translateY(20px) scale(0.97); opacity: 0; }
    to { transform: none; opacity: 1; }
  }
  .modal-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    padding: 20px 24px 16px 20px;
    padding-left: 20px;
    border-bottom: 1px solid var(--border);
    gap: 16px;
    border-left: 4px solid var(--primary);
    border-radius: 12px 12px 0 0;
  }
  .modal-header h2 { font-size: 17px; font-weight: 700; color: var(--text); line-height: 1.4; }
  .modal-header .sub { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
  .modal-close {
    background: #f1f5f9;
    border: none;
    border-radius: 999px;
    width: 32px;
    height: 32px;
    cursor: pointer;
    font-size: 18px;
    line-height: 32px;
    text-align: center;
    color: var(--text-muted);
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .modal-close:hover { background: #e2e8f0; color: var(--text); }
  .modal-body { padding: 20px 24px; }
  .modal-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 20px;
  }
  @media (max-width: 768px) {
    .modal-grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 480px) {
    .modal-grid { grid-template-columns: 1fr; }
  }
  .modal-field { }
  .modal-field.full-width {
    grid-column: 1 / -1;
  }
  .modal-field .field-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-light);
    margin-bottom: 4px;
  }
  .modal-field .field-value {
    font-size: 14px;
    color: var(--text);
    font-weight: 500;
  }
  .modal-section-title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    padding-bottom: 8px;
    margin-bottom: 12px;
  }
  .modal-reasoning {
    background: #eff6ff;
    border-radius: 8px;
    padding: 14px 16px;
    font-size: 14px;
    line-height: 1.7;
    color: var(--text);
    border-left: 3px solid var(--primary);
  }

  /* Responsive */
  @media (max-width: 768px) {
    .header { padding: 16px 16px 0; }
    .main { padding: 14px 0; }
    .sidebar { display: none; }
    .layout { padding: 14px 16px; gap: 0; }
    .global-search { min-width: 200px; }
    .stat-card { min-width: 70px; padding: 8px 12px; }
    .stat-card .num { font-size: 18px; }
    .nav-tab { padding: 8px 12px; font-size: 13px; }
    .header-title h1 { font-size: 16px; }
    tbody td { padding: 8px; }
    .modal-grid { grid-template-columns: 1fr 1fr; }
  }
  @media (max-width: 480px) {
    .nav-tab .tab-label { display: none; }
    .nav-tab { padding: 8px 10px; }
    .modal-grid { grid-template-columns: 1fr; }
  }

  .chevron { transition: transform 0.2s; display: inline-block; }
  .chevron.open { transform: rotate(180deg); }

  /* Highlighted search match */
  mark { background: #fef08a; color: inherit; border-radius: 2px; }

  /* Subcat group header */
  tr.group-header td {
    background: var(--surface-alt);
    border-bottom: 1px solid var(--border);
    border-left: 3px solid var(--primary);
    padding: 10px 16px;
    cursor: pointer;
    user-select: none;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.3px;
    color: var(--text);
    transition: background 0.15s;
  }
  tr.group-header:hover td { background: var(--accent-light); }
  tr.group-header .group-arrow {
    font-size: 11px;
    color: var(--text-muted);
    transition: transform 0.2s;
    display: inline-block;
    width: 14px;
    text-align: center;
    margin-right: 4px;
  }
  tr.group-header.collapsed .group-arrow { transform: rotate(-90deg); }
  tr.group-header .group-count {
    font-size: 12px;
    font-weight: 700;
    background: var(--primary-light);
    color: var(--primary);
    border-radius: 999px;
    padding: 1px 8px;
    margin-left: 6px;
  }

  /* Judge profile card */
  .judge-profile-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.4); z-index: 2000;
    align-items: center; justify-content: center;
    padding: 20px; backdrop-filter: blur(2px);
  }
  .judge-profile-overlay.open { display: flex; }
  .judge-profile-card {
    background: white; border-radius: 12px;
    border: 1px solid var(--border-strong);
    box-shadow: var(--shadow-lg);
    max-width: 480px; width: 100%;
    animation: modalIn 0.2s ease;
  }
  .judge-profile-header {
    display: flex; align-items: flex-start; justify-content: space-between;
    padding: 20px 24px 16px 20px;
    border-bottom: 1px solid var(--border);
    border-left: 4px solid var(--primary);
    border-radius: 12px 12px 0 0;
    gap: 16px;
  }
  .judge-profile-header .name { font-size: 17px; font-weight: 700; color: var(--text); line-height: 1.4; }
  .judge-profile-header .court-label { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
  .judge-profile-body { padding: 20px 24px; }
  .judge-profile-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 12px 20px; margin-bottom: 20px;
  }
  .judge-profile-field .jp-label {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.8px; color: var(--text-light); margin-bottom: 4px;
  }
  .judge-profile-field .jp-value {
    font-size: 14px; color: var(--text); font-weight: 500;
  }
  .judge-profile-notes-title {

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, query) {
  if (!query) return escHtml(text);
  const escaped = escHtml(text);
  const re = new RegExp('(' + query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return escaped.replace(re, '<mark>$1</mark>');
}

function courtLevel(c) {
  if (/高院/.test(c)) return 0;
  if (/中院/.test(c)) return 1;
  return 2;
}
function buildJudgeStats() {
  // 返回 { region: { court: [{judge,count}] } }
  const courtJudgeMap = {};
  DATA.forEach(d => {
    if (!d) return;
    d.judge.split('/').forEach(j => {
      j = j.trim();
      if (!j || j === '—' || j === '-' || j.length < 2) return;
      const key = d.court + '||' + j;
      if (!courtJudgeMap[key]) courtJudgeMap[key] = {court: d.court, judge: j, count: 0};
      courtJudgeMap[key].count++;
    });
  });
  // 按地域分组
  const regionMap = {};
  Object.values(courtJudgeMap).forEach(({court, judge, count}) => {
    const region = COURT_REGION[court] || '其他';
    if (!regionMap[region]) regionMap[region] = {};
    if (!regionMap[region][court]) regionMap[region][court] = [];
    regionMap[region][court].push({judge, count});
  });
  return regionMap;
}

function getFilteredData(catId) {
  let rows = DATA.filter(d => d.category === catId);
  const q = (state.tableQueries[catId] || '').trim().toLowerCase();
  const gq = state.globalQuery.trim().toLowerCase();
  const jf = state.judgeFilter;
  const cf = state.courtFilter;
  const df = state.dateFilter;

  if (jf) rows = rows.filter(d => d.judge.includes(jf));
  if (cf) rows = rows.filter(d => d.court === cf);
  if (df) rows = rows.filter(d => d.date && d.date.startsWith(df));
  if (state.resultFilter === 'lose') rows = rows.filter(d => d.result === 'lose' || d.result === 'lose1');
  if (state.resultFilter === 'win1') rows = rows.filter(d => d.result === 'win1');
  if (state.resultFilter === 'win2') rows = rows.filter(d => d.result === 'win2');
  if (state.resultFilter === 'winRetry') rows = rows.filter(d => d.result === 'winRetry');
  if (state.resultFilter === 'procedural') rows = rows.filter(d => d.result === 'procedural');
  if (gq) {
    rows = rows.filter(d =>
      d.plaintiff.toLowerCase().includes(gq) ||
      d.caseNo.toLowerCase().includes(gq) ||
      d.judge.toLowerCase().includes(gq) ||
      d.keywords.toLowerCase().includes(gq) ||
      d.summary.toLowerCase().includes(gq)
    );
  }
  if (q) {
    rows = rows.filter(d =>
      d.plaintiff.toLowerCase().includes(q) ||
      d.caseNo.toLowerCase().includes(q) ||
      d.judge.toLowerCase().includes(q) ||
      d.keywords.toLowerCase().includes(q) ||
      d.summary.toLowerCase().includes(q) ||
      d.date.includes(q)
    );
  }

  const sort = state.tableSorts[catId];
  if (sort) {
    rows = [...rows].sort((a,b) => {
      let av = a[sort.col], bv = b[sort.col];
      if (typeof av === 'string') av = av.toLowerCase();
      if (typeof bv === 'string') bv = bv.toLowerCase();
      if (av < bv) return sort.dir === 'asc' ? -1 : 1;
      if (av > bv) return sort.dir === 'asc' ? 1 : -1;
      return 0;
    });
  }
  return rows;
}

function renderStats() {
  const total = DATA.length;
  const win1 = DATA.filter(d=>d.result==='win1').length;
  const win2 = DATA.filter(d=>d.result==='win2').length;
  const winRetry = DATA.filter(d=>d.result==='winRetry').length;
  const lose = DATA.filter(d=>d.result==='lose'||d.result==='lose1').length;
  const proc = DATA.filter(d=>d.result==='procedural').length;
  const cats = CATEGORIES.map(c => `<div class="stat-card"><div class="num">${DATA.filter(d=>d.category===c.id).length}</div><div class="label">${c.label.replace('纠纷','')}</div></div>`).join('');

  const rf = state.resultFilter;
  function sc(key, cls, num, label) {
    const active = rf === key;
    return `<div class="stat-card ${cls}${active?' highlight':''}" onclick="toggleResultFilter('${key}')" style="cursor:pointer" title="点击筛选${label}"><div class="num">${num}</div><div class="label">${label}${active?' ✕':''}</div></div>`;
  }
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-card highlight stat-total"><div class="num">${total}</div><div class="label">总案件数</div></div>
    ${sc('win1','stat-win',win1,'一审胜诉')}
    ${sc('win2','stat-win',win2,'二审胜诉')}
    ${sc('winRetry','stat-win',winRetry,'再审胜诉')}
    ${sc('lose','stat-lose',lose,'败诉')}
    ${sc('procedural','stat-proc',proc,'程序性')}
    <div style="flex:1;min-width:8px"></div>
    ${cats}
  `;
}

function renderNavTabs() {
  document.getElementById('navTabs').innerHTML = CATEGORIES.map(c => `
    <button class="nav-tab ${state.activeTab===c.id?'active':''}" onclick="switchTab('${c.id}')">
      <span class="tab-label">${c.label}</span>
      <span class="badge">${c.count}</span>
    </button>
  `).join('');
}

// ── SIDEBAR RENDER ──
function renderSidebar() {
  const el = document.getElementById('sidebarBody');
  if (!el) return;

  // 计算各维度的案件数（基于当前已有的另外两个filter）
  function countWith(extra) {
    return DATA.filter(d => {
      if (!d) return false;
      if (extra.judge && !d.judge.includes(extra.judge)) return false;
      if (extra.court && d.court !== extra.court) return false;
      if (extra.date && !(d.date && d.date.startsWith(extra.date))) return false;
      return true;
    }).length;
  }

  // ── 时间 ──
  const dateMap = {};
  DATA.forEach(d => { if (!d || !d.date) return; const m = d.date.slice(0,7); dateMap[m] = (dateMap[m]||0)+1; });
  const DATE_LABELS = {'2025.03':'2025年3月','2025.06':'2025年6月','2025.10':'2025年10月','2025.11':'2025年11月','2025.12':'2025年12月','2026.01':'2026年1月','2026.02':'2026年2月','2026.03':'2026年3月'};
  const dateOpen = state.sidebarSections.date;
  const dateHtml = `<div class="filter-section">
    <div class="filter-section-header" onclick="toggleSidebarSection('date')">
      <span class="fsh-title"><svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> 时间维度</span>
      <span class="filter-section-chevron ${dateOpen?'':'collapsed'}">▾</span>
    </div>
    ${dateOpen ? `<div class="filter-section-body">
      ${Object.keys(dateMap).sort().map(m => {
        const cnt = countWith({date:m, judge:state.judgeFilter, court:state.courtFilter});
        return `<div class="filter-item${state.dateFilter===m?' active':''}" onclick="filterByDate('${m}')">
          <span class="fi-label">${DATE_LABELS[m]||m}</span><span class="fi-cnt">${cnt}</span>
        </div>`;
      }).join('')}
    </div>` : ''}
  </div>`;

  // ── 法院（按地域分组） ──
  const courtMap = {};
  DATA.forEach(d => { if (!d) return; courtMap[d.court] = (courtMap[d.court]||0)+1; });
  const REGION_ORDER = ['上海','北京','广东','浙江','江苏','重庆','辽宁','黑龙江','河南','湖南','山东','四川','陕西','云南','吉林','海南','福建','广西','其他'];
  const regionCourts = {};
  Object.keys(courtMap).forEach(c => {
    const r = COURT_REGION[c] || '其他';
    if (!regionCourts[r]) regionCourts[r] = [];
    regionCourts[r].push(c);
  });
  const courtOpen = state.sidebarSections.court;
  const courtHtml = `<div class="filter-section">
    <div class="filter-section-header" onclick="toggleSidebarSection('court')">
      <span class="fsh-title"><svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 21h18M3 10h18M5 6l7-3 7 3M4 10v11M20 10v11M8 10v11M12 10v11M16 10v11"/></svg> 法院维度</span>
      <span class="filter-section-chevron ${courtOpen?'':'collapsed'}">▾</span>
    </div>
    ${courtOpen ? `<div class="filter-section-body">
      ${REGION_ORDER.filter(r => regionCourts[r]).map(r => {
        const rOpen = state.sidebarCourtRegions[r] === true;
        const courts = regionCourts[r].sort((a,b) => courtLevel(a)-courtLevel(b) || a.localeCompare(b,'zh'));
        const totalCnt = courts.reduce((s,c) => s + countWith({court:c, judge:state.judgeFilter, date:state.dateFilter}), 0);
        return `<div onclick="toggleCourtRegion('${escHtml(r)}')" style="cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none;padding:6px 4px 6px 4px;margin:6px 0 2px 0;font-size:12px;font-weight:400;color:var(--text-muted);background:var(--surface-alt);border-radius:4px;">
          <span>${r}</span><span style="font-size:10px;color:var(--text-light);">${rOpen?'▾':'▸'} ${totalCnt}</span>
        </div>`
          + (rOpen ? courts.map(c => {
              const cnt = countWith({court:c, judge:state.judgeFilter, date:state.dateFilter});
              return `<div class="filter-item${state.courtFilter===c?' active':''}" onclick="filterByCourt('${escHtml(c)}')">
                <span class="fi-label">${escHtml(c)}</span><span class="fi-cnt">${cnt}</span>
              </div>`;
            }).join('') : '');
      }).join('')}
    </div>` : ''}
  </div>`;

  // ── 法官（按地域/法院分组） ──
  const regionMap = buildJudgeStats();
  const regions = Object.keys(regionMap).sort((a,b) => {
    const ai = REGION_ORDER.indexOf(a), bi = REGION_ORDER.indexOf(b);
    if (ai>=0 && bi>=0) return ai-bi;
    if (ai>=0) return -1; if (bi>=0) return 1;
    return a.localeCompare(b,'zh');
  });
  const judgeOpen = state.sidebarSections.judge;
  const judgeHtml = `<div class="filter-section">
    <div class="filter-section-header" onclick="toggleSidebarSection('judge')">
      <span class="fsh-title"><svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg> 法官维度</span>
      <span class="filter-section-chevron ${judgeOpen?'':'collapsed'}">▾</span>
    </div>
    ${judgeOpen ? `<div class="filter-section-body">
      ${regions.map(region => {
        const rOpen = state.sidebarJudgeRegions[region] === true;
        const courts = Object.keys(regionMap[region]).sort((a,b) => courtLevel(a)-courtLevel(b) || a.localeCompare(b,'zh'));
        const rTotal = courts.reduce((s,court) => s + regionMap[region][court].reduce((ss,{judge}) => ss + countWith({judge, court:state.courtFilter, date:state.dateFilter}),0),0);
        return `<div onclick="toggleJudgeRegion('${escHtml(region)}')" style="cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none;padding:6px 4px 6px 4px;margin:6px 0 2px 0;font-size:12px;font-weight:400;color:var(--text-muted);background:var(--surface-alt);border-radius:4px;">
          <span>${region}</span><span style="font-size:10px;color:var(--text-light);">${rOpen?'▾':'▸'} ${rTotal}</span>
        </div>`
          + (rOpen ? courts.map(court => {
              const cKey = region+'||'+court;
              const cOpen = state.sidebarJudgeCourts[cKey] === true;
              const judges = regionMap[region][court].sort((a,b) => b.count-a.count);
              const cTotal = judges.reduce(({judge:j}={judge:''}) => 0, 0) || judges.reduce((s,{judge:j}) => s + countWith({judge:j, court:state.courtFilter, date:state.dateFilter}),0);
              return `<div style="padding:5px 4px 5px 12px;font-size:12px;font-weight:400;color:var(--text-muted);cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none;" onclick="event.stopPropagation();toggleJudgeCourt('${escHtml(cKey)}')">
                <span>${escHtml(court)}</span><span style="font-size:10px;color:var(--text-light);">${cOpen?'▾':'▸'} ${cTotal}</span>
              </div>`
                + (cOpen ? judges.map(({judge}) => {
                    const cnt = countWith({judge, court:state.courtFilter, date:state.dateFilter});
                    const hasProfile = !!JUDGE_PROFILES[judge];
                    return `<div class="filter-item${state.judgeFilter===judge?' active':''}" onclick="filterByJudge('${escHtml(judge)}')" title="${escHtml(court)}" style="padding-left:20px;">
                      <span class="fi-label">${escHtml(judge)}${hasProfile ? `<span class="judge-profile-icon" onclick="event.stopPropagation();showJudgeProfile('${escHtml(judge)}')" title="查看法官档案">i</span>` : ''}</span><span class="fi-cnt">${cnt}</span>
                    </div>`;
                  }).join('') : '');
            }).join('') : '');
      }).join('')}
    </div>` : ''}
  </div>`;

  el.innerHTML = dateHtml + courtHtml + judgeHtml;

  // 清除全部按钮
  const hasFilter = state.judgeFilter || state.courtFilter || state.dateFilter;
  const clearBtn = document.getElementById('clearAllFilters');
  if (clearBtn) { clearBtn.style.display = hasFilter ? '' : 'none'; clearBtn.style.color = 'var(--text-muted)'; }
}

function toggleSidebarSection(key) {
  state.sidebarSections[key] = !state.sidebarSections[key];
  renderSidebar();
}
function toggleCourtRegion(r) {
  state.sidebarCourtRegions[r] = !state.sidebarCourtRegions[r];
  renderSidebar();
}
function toggleJudgeRegion(r) {
  state.sidebarJudgeRegions[r] = !state.sidebarJudgeRegions[r];
  renderSidebar();
}
function toggleJudgeCourt(key) {
  state.sidebarJudgeCourts[key] = !state.sidebarJudgeCourts[key];
  renderSidebar();
}
function filterByDate(m) {
  state.dateFilter = state.dateFilter === m ? null : m;
  render();
}
function filterByCourt(c) {
  state.courtFilter = state.courtFilter === c ? null : c;
  render();
}
function clearAllFilters() {
  state.judgeFilter = null; state.courtFilter = null; state.dateFilter = null;
  render();
}
function renderJudgePanel() { renderSidebar(); }

function renderTabPanels() {
  document.getElementById('tabPanels').innerHTML = CATEGORIES.map(c => renderPanel(c)).join('');
}

// Track collapsed groups: { catId: Set<subcat> }
const collapsedGroups = {};

function toggleGroup(catId, subcat) {
  if (!collapsedGroups[catId]) collapsedGroups[catId] = new Set();
  if (collapsedGroups[catId].has(subcat)) {
    collapsedGroups[catId].delete(subcat);
  } else {
    collapsedGroups[catId].add(subcat);
  }
  reRenderPanel(catId);
}

function renderPanel(cat) {
  const rows = getFilteredData(cat.id);
  const sort = state.tableSorts[cat.id] || {};
  const isSearching = !!(state.globalQuery || state.tableQueries[cat.id]);
  const hl = (state.globalQuery || state.tableQueries[cat.id] || '').trim().toLowerCase();

  const cols = [
    {key:'date', label:'日期'},
    {key:'plaintiff', label:'原告'},
    {key:'caseNo', label:'案号'},
    {key:'court', label:'法院'},
    {key:'judge', label:'法官'},
    {key:'result', label:'结果'},
    {key:'claim', label:'原告索赔'},
    {key:'keywords', label:'关键词'},
  ];

  // 笔记侵权Tab关键词列改为"免责说理要点"
  const adjustedCols = cols.map(c => {
    if (c.key === 'keywords' && cat.id === 'personality-rights') {
      return { ...c, label: '关键词' };
    }
    return c;
  });
  const thHtml = adjustedCols.map(c => {
    let cls = '';
    if (sort.col === c.key) cls = sort.dir === 'asc' ? 'sorted-asc' : 'sorted-desc';
    return `<th class="${cls}" onclick="sortTable('${cat.id}','${c.key}')">${escHtml(c.label)}<span class="sort-icon"></span></th>`;
  }).join('');

  // Build subcat groups preserving original data order
  const subcatOrder = [];
  const subcatMap = {};
  // Use original DATA order to determine subcat ordering within category
  DATA.filter(d => d.category === cat.id).forEach(d => {
    if (!subcatMap[d.subcat]) {
      subcatMap[d.subcat] = [];
      subcatOrder.push(d.subcat);
    }
  });
  // Distribute filtered rows into groups
  rows.forEach(r => {
    if (!subcatMap[r.subcat]) {
      // subcat not in original order (shouldn't happen), add it
      subcatMap[r.subcat] = [];
      subcatOrder.push(r.subcat);
    }
    subcatMap[r.subcat].push(r);
  });

  const collapsed = collapsedGroups[cat.id] || new Set();

  function renderRow(r) {
    // 笔记侵权类：关键词列显示免责说理摘要；其他类别显示 keywords
    let kwTags;
    if (cat.id === 'personality-rights') {
      // 第三人直接标注
      if (r.xingyinRole === '第三人') {
        kwTags = `<span class="kw-tag">${highlight('第三人', hl)}</span>`;
      } else {
        const s = r.summary || '';
        const tags = [];
        // 败诉案件优先识别担责原因
        if (r.subcat === '行吟被判承担责任') {
          if (/未及时|未.*删除|拒绝.*下架|未.*处置|未尽.*管理/.test(s)) tags.push('未及时处置');
          else tags.push('被判担责');
          kwTags = tags.map(k => `<span class="kw-tag">${highlight(k, hl)}</span>`).join('');
        } else if (/私信|隐蔽/.test(s))                                              tags.push('私信隐蔽');
        if (/仅提供.*存储|存储服务|无.*主动审查/.test(s))                      tags.push('存储免责');
        if (/及时删除|及时下架|及时处置|及时处理|及时采取|收到.*删|收到.*下架|断开.*链接|已.*下架|屏蔽.*处理/.test(s)) tags.push('及时处置');
        if (/收到.*律师函|律师函后/.test(s))                                   tags.push('律师函处置');
        if (/未收到.*通知|未向.*发.*通知|无.*有效通知|未举证.*通知/.test(s))    tags.push('无有效通知');
        if (/披露.*用户|披露.*信息|协助.*披露/.test(s))                        tags.push('披露信息');
        if (/连带.*缺乏|连带.*无据|无需.*连带|不应.*连带|缺乏.*依据|缺乏事实/.test(s)) tags.push('连带无据');
        if (/不构成.*知道|不能证明.*知道|无.*故意|无过错|不存在.*过错/.test(s)) tags.push('不知情免责');
        if (/未实施.*侵权|无.*共同侵权|不构成.*侵权|无需.*担责|无需.*承担|不承担.*责任/.test(s)) tags.push('无侵权行为');
        if (/合理管理|尽.*管理义务|履行.*义务|尽.*注意义务/.test(s))            tags.push('尽管理义务');
        if (/撤回.*诉请|当庭撤回/.test(s))                                     tags.push('原告撤诉');
        if (/诉讼时效|时效届满/.test(s))                                       tags.push('时效届满');
        if (/怠于行使|怠于履行|不存在.*行使/.test(s))                      tags.push('无侵权行为');
        if (/尽法定义务|已尽.*义务|履行法定/.test(s))                          tags.push('尽管理义务');
        // 无说理/未涉及/败诉：显示语义化兜底标签
        if (tags.length === 0) {
          if (r.subcat === '行吟被判承担责任') {
            if (/未及时|未.*删除|拒绝.*下架|未.*处置|未尽.*义务/.test(s)) tags.push('未及时处置');
            else tags.push('被判担责');
          }
          else if (r.subcat === '行吟免责（无专门说理）') tags.push('未专门论及');
          else tags.push(r.infType || '名誉权');
        }
        if (r.subcat !== '行吟被判承担责任') {
          kwTags = tags.slice(0,2).map(k => `<span class="kw-tag">${highlight(k, hl)}</span>`).join('');
        }
      }
    } else {
      kwTags = r.keywords.split(',').map(k => `<span class="kw-tag">${highlight(k.trim(), hl)}</span>`).join('');
    }
    return `<tr onclick="openModal(${r.id})">
      <td class="date">${highlight(r.date, hl)}</td>
      <td class="plaintiff">${highlight(r.plaintiff, hl)}</td>
      <td class="case-no">${highlight(r.caseNo, hl)}</td>
      <td class="court" title="${escHtml(r.court)}">${highlight(shortCourt(r.court), hl)}</td>
      <td class="judge">${highlight(r.judge, hl)}</td>
      <td><span class="badge-result ${r.result}">${getResultLabel(r.result)}</span></td>
      <td class="claim">${escHtml(r.claim)}</td>
      <td class="keywords">${kwTags}</td>
    </tr>`;
  }

  let tbodyHtml = '';
  if (rows.length === 0) {
    tbodyHtml = `<tr><td colspan="8"><div class="empty-state">
      <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <p>没有找到匹配的案件</p>
    </div></td></tr>`;
  } else {
    // When searching, auto-expand all groups
    subcatOrder.forEach(subcat => {
      const groupRows = subcatMap[subcat];
      if (!groupRows || groupRows.length === 0) return;
      const isCollapsed = !isSearching && collapsed.has(subcat);
      const escapedSubcat = subcat.replace(/'/g, "\\'");
      tbodyHtml += `<tr class="group-header${isCollapsed ? ' collapsed' : ''}" onclick="toggleGroup('${cat.id}', '${escapedSubcat}')">
        <td colspan="8">
          <span class="group-arrow">▼</span>
          ${escHtml(subcat)}<span class="group-count">${groupRows.length} 件</span>
        </td>
      </tr>`;
      if (!isCollapsed) {
        tbodyHtml += groupRows.map(renderRow).join('');
      }
    });
  }

  return `
    <div class="tab-panel ${state.activeTab===cat.id?'active':''}" id="panel-${cat.id}">
      <div class="table-toolbar">
        <div class="table-search">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" placeholder="在此分类内搜索…" value="${escHtml(state.tableQueries[cat.id]||'')}" oninput="tableSearch('${cat.id}', this.value)" />
        </div>
        ${state.judgeFilter ? `<span style="background:var(--surface-alt);color:var(--text);border:1px solid var(--border);border-left:3px solid var(--primary);border-radius:5px;padding:3px 10px 3px 8px;font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:6px;">法官：${escHtml(state.judgeFilter)}<button onclick="clearJudgeFilter()" style="background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:13px;line-height:1;padding:0;">✕</button></span>` : ''}
  ${state.courtFilter ? `<span style="background:var(--surface-alt);color:var(--text);border:1px solid var(--border);border-left:3px solid var(--primary);border-radius:5px;padding:3px 10px 3px 8px;font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:6px;">法院：${escHtml(state.courtFilter)}<button onclick="filterByCourt(state.courtFilter)" style="background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:13px;line-height:1;padding:0;">✕</button></span>` : ''}
  ${state.dateFilter ? `<span style="background:var(--surface-alt);color:var(--text);border:1px solid var(--border);border-left:3px solid var(--primary);border-radius:5px;padding:3px 10px 3px 8px;font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:6px;">时间：${escHtml(state.dateFilter)}<button onclick="filterByDate(state.dateFilter)" style="background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:13px;line-height:1;padding:0;">✕</button></span>` : ''}
        <div class="table-info">共 ${rows.length} 条</div>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>${thHtml}</tr></thead>
          <tbody>${tbodyHtml}</tbody>
        </table>
      </div>
    </div>
  `;
}

function shortCourt(c) {
  // Shorten for table display: keep district/city + court level
  return c
    .replace('人民法院', '法院')
    .replace(/^上海市/, '')
    .replace(/^北京市/, '')
    .replace(/^广东省/, '')
    .replace(/^云南省/, '')
    .replace(/^重庆市/, '')
    .replace(/^辽宁省/, '')
    .replace(/^四川省/, '')
    .replace(/^吉林省?/, '')
    .replace(/^海南省/, '')
    .replace(/^江苏省/, '')
    .replace(/^山东省/, '')
    .replace(/^河南省/, '');
}

function openModal(id) {
  const r = DATA.find(d => d.id === id);
  if (!r) return;
  document.getElementById('modalTitle').textContent = r.plaintiff + ' v. 行吟信息科技';
  document.getElementById('modalSub').textContent = r.caseNo + ' · ' + r.court;

  // Build fields based on category
  const commonFields = [
    {label:'日期', value: r.date},
    {label:'原告', value: r.plaintiff},
    {label:'案号', value: r.caseNo},
    {label:'法院', value: r.court},
    {label:'法官', value: r.judge},
    {label:'案件类型', value: CATEGORIES.find(c=>c.id===r.category)?.label || ''},
    {label:'子分类', value: r.subcat},
    {label:'审理结果', value: `<span class="badge-result ${r.result}">${getResultLabel(r.result)}</span>`, isHtml: true},
    {label:'原告索赔金额', value: r.claim},
  ];

  // Category-specific extra fields
  let extraFields = [];
  if (r.category === 'user-ban') {
    extraFields = [
      {label:'封号原因', value: r.reason || '—', fullWidth: true}
    ];
  } else if (r.category === 'merchant') {
    extraFields = [
      {label:'处置内容', value: r.disposal || '—', fullWidth: true},
      {label:'处置原因', value: r.dispReason || '—', fullWidth: true},
      {label:'原告主张', value: r.plaintiffClaim || '—', fullWidth: true}
    ];
  } else if (r.category === 'ecommerce') {
    extraFields = [
      {label:'购买商品', value: r.goods || '—', fullWidth: true},
      {label:'争议焦点', value: r.disputeFocus || '—', fullWidth: true},
      {label:'商家责任认定', value: r.merchantResult || '—', fullWidth: true}
    ];
  } else if (r.category === 'contract') {
    extraFields = [
      {label:'行吟身份', value: r.role || '—'},
      {label:'案件概要', value: r.caseOverview || '—', fullWidth: true}
    ];
  } else if (r.category === 'personality-rights') {
    extraFields = [
      {label:'行吟身份', value: r.xingyinRole || '—'},
      {label:'侵权类型', value: r.infType || '—'},
      {label:'侵权内容摘要', value: r.infSummary || '—', fullWidth: true},
      {label:'对平台索赔', value: r.claim || '—'}
    ];
  }

  // PDF file field - link to monthly doc
  const MONTH_LINKS = {
    '10': 'https://docs.xiaohongshu.com/doc/e0c17c1193ea786c157a1b86967ccadc',
    '11': 'https://docs.xiaohongshu.com/doc/692d724eb0ca33825e1ec4c6a5551516',
    '12': 'https://docs.xiaohongshu.com/doc/65e0a7ad30a12951c6510acc90841155',
    '01': 'https://docs.xiaohongshu.com/doc/bec5c32b37a1faa43f4bd43f6698d589',
    '02': 'https://docs.xiaohongshu.com/doc/ae1de542ffeb18a8fa1815613cf4bee7',
    '03': 'https://docs.xiaohongshu.com/doc/f14c0e27bf6d1a06afde197b5c8a1061',
  };
  const dateStr = r.date || '';
  const monthKey = dateStr.length >= 7 ? dateStr.slice(5, 7) : '';
  const docUrl = MONTH_LINKS[monthKey];
  const yearKey = dateStr.length >= 4 ? dateStr.slice(0, 4) : '';
  const monthLabel = monthKey ? yearKey + '年' + monthKey.replace(/^0/,'') + '月文书汇总文档' : '—';
  const pdfField = docUrl
    ? {label:'判决书文件', value: `<a href="${docUrl}" target="_blank" style="color:#1a6fad;text-decoration:underline;">${monthLabel}</a>`, isHtml: true, fullWidth: true}
    : {label:'判决书文件', value: r.pdfFile || '—', fullWidth: true};

  // Combine all fields
  const allFields = [...commonFields, ...extraFields, pdfField];

  document.getElementById('modalGrid').innerHTML = allFields.map(f =>
    `<div class="modal-field ${f.fullWidth ? 'full-width' : ''}">
      <div class="field-label">${escHtml(f.label)}</div>
      <div class="field-value">${f.isHtml ? f.value : escHtml(f.value)}</div>
    </div>`
  ).join('');

  document.getElementById('modalReasoning').textContent = r.summary;

  // PDF button (removed - now shown as field)
  const pdfBtn = document.getElementById('modalPdfBtn');
  pdfBtn.style.display = 'none';

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

// ============================================================
// ACTIONS
// ============================================================
function switchTab(id) {
  state.activeTab = id;
  renderNavTabs();
  document.querySelectorAll('.tab-panel').forEach(el => el.classList.remove('active'));
  const panel = document.getElementById('panel-' + id);
  if (panel) panel.classList.add('active');
  else renderTabPanels();
}

function sortTable(catId, col) {
  const cur = state.tableSorts[catId];
  if (cur && cur.col === col) {
    state.tableSorts[catId] = { col, dir: cur.dir === 'asc' ? 'desc' : 'asc' };
  } else {
    state.tableSorts[catId] = { col, dir: 'asc' };
  }
  reRenderPanel(catId);
}

function tableSearch(catId, val) {
  state.tableQueries[catId] = val;
  reRenderPanel(catId);
}

function reRenderPanel(catId) {
  const cat = CATEGORIES.find(c => c.id === catId);
  if (!cat) return;
  const el = document.getElementById('panel-' + catId);
  if (el) {
    const isActive = el.classList.contains('active');
    el.outerHTML = renderPanel(cat);
    const newEl = document.getElementById('panel-' + catId);
    if (isActive && newEl) newEl.classList.add('active');
  }
}

function render() {
  renderSidebar();
  CATEGORIES.forEach(c => reRenderPanel(c.id));
}

function filterByJudge(j) {
  state.judgeFilter = state.judgeFilter === j ? null : j;
  render();
}

function showJudgeProfile(name) {
  const p = JUDGE_PROFILES[name];
  if (!p) return;
  document.getElementById('jpName').textContent = name;
  document.getElementById('jpCourt').textContent = p.court || '';
  document.getElementById('jpChamber').textContent = p.chamber || '—';
  document.getElementById('jpContact').textContent = p.contact || '—';
  document.getElementById('jpAssistant').textContent = p.assistant || '—';
  document.getElementById('jpAssistantContact').textContent = p.assistantContact || '—';
  document.getElementById('jpClerk').textContent = p.clerk || '—';
  document.getElementById('jpClerkContact').textContent = p.clerkContact || '—';
  document.getElementById('jpNotes').textContent = p.notes || '—';
  document.getElementById('judgeProfileOverlay').classList.add('open');
}

function closeJudgeProfile(e) {
  if (e && e.target !== document.getElementById('judgeProfileOverlay')) return;
  document.getElementById('judgeProfileOverlay').classList.remove('open');
}

function clearJudgeFilter() {
  state.judgeFilter = null;
  render();
}

function toggleResultFilter(key) {
  state.resultFilter = state.resultFilter === key ? null : key;
  render();
}

function toggleJudgePanel() {}
function toggleJudgeSidebar() {}

function clearGlobalSearch() {
  state.globalQuery = '';
  document.getElementById('globalSearch').value = '';
  document.getElementById('searchBanner').classList.remove('visible');
  CATEGORIES.forEach(c => reRenderPanel(c.id));
}

// Global search
document.getElementById('globalSearch').addEventListener('input', function() {
  state.globalQuery = this.value.trim().toLowerCase();
  const banner = document.getElementById('searchBanner');
  if (state.globalQuery) {
    const total = DATA.filter(d =>
      d.plaintiff.toLowerCase().includes(state.globalQuery) ||
      d.caseNo.toLowerCase().includes(state.globalQuery) ||
      d.judge.toLowerCase().includes(state.globalQuery) ||
      d.keywords.toLowerCase().includes(state.globalQuery) ||
      d.summary.toLowerCase().includes(state.globalQuery)
    ).length;
    document.getElementById('searchBannerText').textContent = `全局搜索「${this.value.trim()}」，共找到 ${total} 条案件（跨所有分类）`;
    banner.classList.add('visible');
  } else {
    banner.classList.remove('visible');
  }
  CATEGORIES.forEach(c => reRenderPanel(c.id));
});

// Keyboard close modal
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeModal();
    document.getElementById('judgeProfileOverlay').classList.remove('open');
  }
});

// ============================================================
// INIT
// ============================================================
function init() {
  renderStats();
  renderNavTabs();
  renderSidebar();
  renderTabPanels();
}

init();
</script>
